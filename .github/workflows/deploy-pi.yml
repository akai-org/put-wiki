name: Deploy put-wiki to Raspberry Pi

on:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: [self-hosted, raspberry-pi]
    env:
      PUT_WIKI_DIR: /home/joszko/put-wiki

    steps:
      - name: Fetch new code, pull images and run
        shell: bash
        run: |
          cd "$PUT_WIKI_DIR"

          git fetch origin --tags

          git checkout -f tags/${{ github.event.release.tag_name }}

          TAG=${{ github.event.release.tag_name }} docker compose -f compose.yml -f compose.prod.yml up -d
