name: CD

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest

    outputs:
      client: ${{ steps.filter.outputs.client }}
      server: ${{ steps.filter.outputs.server }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Check last tag
        id: last-tag
        uses: anothrNick/github-tag-action@1.75.0
        env:
          Dry_Run: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
          TAG_PREFIX: v

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          base: ${{ steps.last-tag.outputs.old_tag }}
          filters: |
            client:
              - 'client/**'
            server:
              - 'server/**'

  set-version:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.client == 'true' || needs.detect-changes.outputs.server == 'true'

    outputs:
      tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Create tag
        id: tag
        uses: anothrNick/github-tag-action@1.75.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_PREFIX: v

  build-client:
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - set-version

    if: needs.detect-changes.outputs.client == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Login to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Build and push client image
        uses: docker/build-push-action@v7.2.0
        with:
          context: ./client
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/client:${{ needs.set-version.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/client:latest

  build-server:
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - set-version

    if: needs.detect-changes.outputs.server == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Login to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Build and push server image
        uses: docker/build-push-action@v7.2.0
        with:
          context: ./server
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/server:${{ needs.set-version.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/server:latest

  release:
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - set-version
      - build-client
      - build-server

    if: |
      always() &&
      (needs.detect-changes.outputs.client == 'true' || needs.detect-changes.outputs.server == 'true') &&
      needs.set-version.result == 'success' &&
      (needs.build-client.result == 'success' || needs.build-client.result == 'skipped') &&
      (needs.build-server.result == 'success' || needs.build-server.result == 'skipped')

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.set-version.outputs.tag }}
          name: Release ${{ needs.set-version.outputs.tag }}
          generate_release_notes: true