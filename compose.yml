services:
  proxy:
    image: nginx:1.29.5-alpine
    container_name: proxy
    hostname: proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app_network
    restart: unless-stopped
    depends_on:
      client:
        condition: service_started
      server:
        condition: service_healthy

  database:
    image: postgres:18
    container_name: database
    restart: unless-stopped
    env_file:
      - .env.postgres
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]      
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 10s

  server:
    build:
      context: ./server
      target: prod
    container_name: server
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=3000
    networks:
      - app_network
    restart: unless-stopped
    volumes:
      - aspnet_keys:/root/.aspnet/DataProtection-Keys
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:$${ASPNETCORE_HTTP_PORTS}/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  client:
    build:
      context: ./client
      target: prod
    container_name: client
    networks:
      - app_network
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy

networks:
  app_network:
    driver: bridge

volumes:
  db_data:
  aspnet_keys:
