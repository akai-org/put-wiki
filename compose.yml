services:
  client:
    build:
      context: ./client
      target: dev
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    develop:
      watch:
        - action: sync
          path: ./client/src
          target: /app/src

        - action: sync
          path: ./client/index.html
          target: /app/index.html

        - action: sync
          path: ./client/components.json
          target: /app/components.json

        - action: sync
          path: ./client/eslint.config.js
          target: /app/eslint.config.js

        - action: sync
          path: ./client/.prettierrc
          target: /app/.prettierrc

        - action: sync
          path: ./client/.lintstagedrc
          target: /app/.lintstagedrc

        - action: sync+restart
          path: ./client/vite.config.ts
          target: /app/vite.config.ts

        - action: sync+restart
          path: ./client/vitest.config.ts
          target: /app/vitest.config.ts

        - action: sync+restart
          path: ./client/.storybook
          target: /app/.storybook

        - action: sync+restart
          path: ./client/tsconfig.json
          target: /app/tsconfig.json

        - action: sync+restart
          path: ./client/tsconfig.app.json
          target: /app/tsconfig.app.json

        - action: sync+restart
          path: ./client/tsconfig.node.json
          target: /app/tsconfig.node.json

        - action: sync+restart
          path: ./client/.env
          target: /app/.env

        - action: rebuild
          path: ./client/package.json

        - action: rebuild
          path: ./client/bun.lock