services:
  proxy:
    image: nginx:1.29.5-alpine
    container_name: proxy
    hostname: proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - client
      - server
    networks:
      - app_network
    restart: unless-stopped
  database:
    image: postgres:15
    container_name: database
    restart: unless-stopped
    env_file:
      - .env.postgres
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
  server:
    build:
      context: ./server
      target: prod
    container_name: server
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=3000
    networks:
      - app_network
    restart: unless-stopped

  client:
    build:
      context: ./client
      target: prod
    container_name: client
    depends_on:
      - server
    networks:
      - app_network
    restart: unless-stopped

networks:
  app_network:
    driver: bridge

volumes:
  db_data:
