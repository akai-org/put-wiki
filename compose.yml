services:
  server:
    build:
      context: ./server
      target: prod
    container_name: server
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=3000
    networks:
      - app_network

  client:
    build:
      context: ./client
      target: prod
    container_name: client
    restart: always
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - app_network

networks:
  app_network:
    driver: bridge