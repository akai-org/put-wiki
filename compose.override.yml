services:
  database:
    ports:
      - "5433:5432"

  server:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  pgadmin:
    image: dpage/pgadmin4:9.15.0
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@putwiki.pl
      PGADMIN_DEFAULT_PASSWORD: zaq1@WSX
    ports:
      - "5050:80"
    networks:
      - app_network
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      database:
        condition: service_healthy